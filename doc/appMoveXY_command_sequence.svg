<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
    <style>
      .title { font: 700 24px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 14px Arial, sans-serif; fill: #374151; }
      .actor { font: 700 14px Arial, sans-serif; fill: #111827; }
      .label { font: 13px Arial, sans-serif; fill: #111827; }
      .note { font: 12px Arial, sans-serif; fill: #374151; }
      .lane { stroke: #9ca3af; stroke-dasharray: 6 6; stroke-width: 1.2; }
      .box { fill: #f3f4f6; stroke: #6b7280; }
      .msg { stroke: #1f2937; stroke-width: 1.6; marker-end: url(#arrow); }
    </style>
  </defs>

  <text x="30" y="40" class="title">UML Sequence Diagram: appMoveXY Command Path</text>
  <text x="30" y="66" class="subtitle">Scope: standalone tool side, from CLI invocation to UDP frame send</text>

  <rect x="70" y="90" width="170" height="44" class="box"/>
  <text x="96" y="117" class="actor">Operator / Shell</text>

  <rect x="330" y="90" width="170" height="44" class="box"/>
  <text x="359" y="117" class="actor">appMoveXY</text>

  <rect x="590" y="90" width="190" height="44" class="box"/>
  <text x="621" y="117" class="actor">ConfigLoader</text>

  <rect x="880" y="90" width="220" height="44" class="box"/>
  <text x="939" y="117" class="actor">UDP Socket Layer</text>

  <line x1="155" y1="145" x2="155" y2="710" class="lane"/>
  <line x1="415" y1="145" x2="415" y2="710" class="lane"/>
  <line x1="685" y1="145" x2="685" y2="710" class="lane"/>
  <line x1="990" y1="145" x2="990" y2="710" class="lane"/>

  <line x1="165" y1="190" x2="405" y2="190" class="msg"/>
  <text x="182" y="181" class="label">1) run appMoveXY -x 12.3 -f 25000</text>

  <line x1="425" y1="245" x2="675" y2="245" class="msg"/>
  <text x="437" y="236" class="label">2) load config/config.json</text>

  <line x1="675" y1="295" x2="425" y2="295" class="msg"/>
  <text x="468" y="286" class="label">3) return communication.listenIp/listenPort</text>

  <line x1="425" y1="350" x2="980" y2="350" class="msg"/>
  <text x="437" y="341" class="label">4) socket(AF_INET, SOCK_DGRAM)</text>

  <line x1="425" y1="405" x2="980" y2="405" class="msg"/>
  <text x="437" y="396" class="label">5) sendto(frameJson)</text>

  <rect x="350" y="438" width="650" height="160" fill="#eef2ff" stroke="#6366f1"/>
  <text x="365" y="462" class="label">Frame payload built by appMoveXY</text>
  <text x="365" y="488" class="note">timestampEpochMs: now()</text>
  <text x="365" y="510" class="note">destinationModule: moveXY</text>
  <text x="365" y="532" class="note">sourceModule: appMoveXY</text>
  <text x="365" y="554" class="note">payloadType: device-command</text>
  <text x="365" y="576" class="note">payloadJson: { action: moveXY, xPos: 12.3, speed: 25000, replyMode: source }</text>

  <line x1="980" y1="635" x2="425" y2="635" class="msg"/>
  <text x="604" y="626" class="label">6) send success</text>

  <line x1="405" y1="685" x2="165" y2="685" class="msg"/>
  <text x="205" y="676" class="label">7) CLI exits with status 0</text>
</svg>
