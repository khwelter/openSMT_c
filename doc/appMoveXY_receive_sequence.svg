<svg xmlns="http://www.w3.org/2000/svg" width="1420" height="960" viewBox="0 0 1420 960">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
    <style>
      .title { font: 700 24px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 14px Arial, sans-serif; fill: #374151; }
      .actor { font: 700 13px Arial, sans-serif; fill: #111827; }
      .label { font: 12px Arial, sans-serif; fill: #111827; }
      .note { font: 11px Arial, sans-serif; fill: #374151; }
      .lane { stroke: #9ca3af; stroke-dasharray: 6 6; stroke-width: 1.2; }
      .box { fill: #f3f4f6; stroke: #6b7280; }
      .msg { stroke: #1f2937; stroke-width: 1.5; marker-end: url(#arrow); }
    </style>
  </defs>

  <text x="30" y="40" class="title">UML Sequence Diagram: appMoveXY Receive/Execute Path</text>
  <text x="30" y="66" class="subtitle">Scope: main app side, from UDP receive to Marlin command execution and optional reply</text>

  <rect x="30" y="90" width="170" height="44" class="box"/>
  <text x="60" y="117" class="actor">MessageBus RX</text>

  <rect x="230" y="90" width="180" height="44" class="box"/>
  <text x="247" y="117" class="actor">DeviceDriver(moveXY)</text>

  <rect x="440" y="90" width="180" height="44" class="box"/>
  <text x="467" y="117" class="actor">GenericDeviceDriver</text>

  <rect x="650" y="90" width="180" height="44" class="box"/>
  <text x="667" y="117" class="actor">SerialHardwareDriver</text>

  <rect x="860" y="90" width="190" height="44" class="box"/>
  <text x="876" y="117" class="actor">MarlinProtocolAdapter</text>

  <rect x="1080" y="90" width="150" height="44" class="box"/>
  <text x="1124" y="117" class="actor">TTY Device</text>

  <rect x="1260" y="90" width="130" height="44" class="box"/>
  <text x="1280" y="117" class="actor">MessageBus TX</text>

  <line x1="115" y1="145" x2="115" y2="900" class="lane"/>
  <line x1="320" y1="145" x2="320" y2="900" class="lane"/>
  <line x1="530" y1="145" x2="530" y2="900" class="lane"/>
  <line x1="740" y1="145" x2="740" y2="900" class="lane"/>
  <line x1="955" y1="145" x2="955" y2="900" class="lane"/>
  <line x1="1155" y1="145" x2="1155" y2="900" class="lane"/>
  <line x1="1325" y1="145" x2="1325" y2="900" class="lane"/>

  <line x1="125" y1="190" x2="310" y2="190" class="msg"/>
  <text x="136" y="181" class="label">1) dispatchLocal(frame for destination moveXY)</text>

  <line x1="330" y1="242" x2="520" y2="242" class="msg"/>
  <text x="342" y="233" class="label">2) onFrame(): action=moveXY</text>

  <line x1="540" y1="294" x2="730" y2="294" class="msg"/>
  <text x="552" y="285" class="label">3) moveXY(x?, y?, speed)</text>

  <line x1="750" y1="346" x2="945" y2="346" class="msg"/>
  <text x="762" y="337" class="label">4) buildCommand(deviceDriverId, action, payload)</text>

  <line x1="945" y1="398" x2="750" y2="398" class="msg"/>
  <text x="786" y="389" class="label">5) returns G-code: G0 X.. Y.. F.. (or single-axis variant)</text>

  <line x1="750" y1="450" x2="1145" y2="450" class="msg"/>
  <text x="762" y="441" class="label">6) writeLine("G0 ...")</text>

  <line x1="1145" y1="502" x2="750" y2="502" class="msg"/>
  <text x="852" y="493" class="label">7) readLineUntil() ... waits for ok / Error:</text>

  <line x1="750" y1="554" x2="540" y2="554" class="msg"/>
  <text x="560" y="545" class="label">8) execute() response ok/error</text>

  <line x1="540" y1="606" x2="330" y2="606" class="msg"/>
  <text x="362" y="597" class="label">9) moveXY result returned</text>

  <line x1="330" y1="658" x2="1315" y2="658" class="msg"/>
  <text x="344" y="649" class="label">10) sendReply() if replyMode=source or broadcast</text>

  <rect x="260" y="708" width="1090" height="180" fill="#ecfeff" stroke="#0891b2"/>
  <text x="278" y="732" class="label">Marlin-focused receive behavior in SerialHardwareDriver</text>
  <text x="278" y="756" class="note">- ignore informational lines: busy:, echo:, start</text>
  <text x="278" y="778" class="note">- success terminal: line starts with ok</text>
  <text x="278" y="800" class="note">- failure terminal: line starts with Error: / error:</text>
  <text x="278" y="822" class="note">- timeout: controlled by serialResponseTimeoutMs in runtime/hardware-drivers.json</text>
</svg>
